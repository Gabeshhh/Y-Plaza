# ── Serveur ────────────────────────────────────────────────────────
server.port=8080

# ── Base de données PostgreSQL ──────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/yplaza
spring.datasource.username=yplaza
spring.datasource.password=yplaza
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ─────────────────────────────────────────────────────────────
jwt.secret=yplaza-secret-key-very-long-and-secure-256bits-minimum-required
jwt.expiration=86400000

# ── CORS ────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:4200

# ── Logs ────────────────────────────────────────────────────────────
logging.level.com.yplaza=INFO
logging.level.org.springframework.security=WARN
